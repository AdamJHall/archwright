# e2e feature coverage (heaviest): exercises the Phase B KDE stage — apply a look &
# feel + color scheme via the plasma-apply-* helpers. Needs plasma-desktop (pulls
# plasma-workspace, which ships plasma-apply-*). The helpers normally want a running
# Plasma session, so the KDE stage warns (not fatal) on failure; headless they may
# behave differently — best-effort. Disk layout is the same minimal single-disk LVM
# as features-min.
system:
  hostname: arch-e2e
  timezone: Etc/UTC
  locale: en_US.UTF-8
  keymap: us
  ntp: false

user:
  name: e2e
  shell: /usr/bin/bash
  groups: [wheel]

disks:
  layout: lvm
  esp:
    device: /dev/vda
    size: 512MiB
  swap:
    type: swapfile
    size: 256MiB
  lvm:
    vg: vg0
    lv: root
    filesystem: ext4
    pvs:
      - /dev/vda2

mirrors:
  reflector: false

pacstrap:
  - base-devel
  - git
  - sudo
  - networkmanager
  - efibootmgr
  - intel-ucode

packages:
  - plasma-desktop        # provides plasma-apply-* (via plasma-workspace)

kernel:
  base: [linux]

bootloader:
  kind: grub

desktop:
  environment: kde

kde:
  look_and_feel: org.kde.breezedark.desktop

dotfiles:
  manager: none

aur_helper: yay
