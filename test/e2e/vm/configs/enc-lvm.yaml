# e2e: LUKS lvm_on_luks — encrypt the PV partition(s), LVM on top. Single disk.
# Encrypted installs skip Phase B staging (postInstall bails on a LUKS remount
# that isn't implemented yet), so this descriptor validates the on-disk LUKS
# layout on the live ISO instead of booting Phase B. The LUKS passphrase is the
# --yes throwaway install password ("installme").
system:
  hostname: arch-e2e
  timezone: Etc/UTC
  locale: en_US.UTF-8
  keymap: us
  ntp: false

user:
  name: e2e
  shell: /usr/bin/bash
  groups: [wheel]

disks:
  layout: lvm
  esp:
    device: /dev/vda
    size: 512MiB
  swap:
    type: swapfile
    size: 256MiB
  lvm:
    vg: vg0
    lv: root
    filesystem: ext4
    pvs:
      - /dev/vda2
  encryption:
    type: lvm_on_luks

mirrors:
  reflector: false

pacstrap:
  - base-devel
  - git
  - sudo
  - networkmanager
  - efibootmgr
  - intel-ucode

packages:
  - tree
  - jq

kernel:
  base: [linux]

bootloader:
  kind: grub

desktop:
  environment: none

dotfiles:
  manager: none

aur_helper: yay
