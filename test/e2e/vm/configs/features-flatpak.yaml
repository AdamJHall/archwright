# e2e feature coverage (heavy): exercises the Phase B flatpak stage — register a
# remote (flathub) and install one small app from it. This pulls a flatpak runtime,
# which is expected (and the reason this lives in its own on-demand descriptor).
# Disk layout is the same minimal single-disk LVM as features-min.
system:
  hostname: arch-e2e
  timezone: Etc/UTC
  locale: en_US.UTF-8
  keymap: us
  ntp: false

user:
  name: e2e
  shell: /usr/bin/bash
  groups: [wheel]

disks:
  layout: lvm
  esp:
    device: /dev/vda
    size: 512MiB
  swap:
    type: swapfile
    size: 256MiB
  lvm:
    vg: vg0
    lv: root
    filesystem: ext4
    pvs:
      - /dev/vda2

mirrors:
  reflector: false

pacstrap:
  - base-devel
  - git
  - sudo
  - networkmanager
  - efibootmgr
  - intel-ucode

packages:
  - flatpak        # the flatpak stage installs this if missing, but list it explicitly

kernel:
  base: [linux]

bootloader:
  kind: grub

desktop:
  environment: none

dotfiles:
  manager: none

flatpak_remotes:
  - name: flathub
    url: https://flathub.org/repo/flathub.flatpakrepo

flatpaks:
  - flathub:com.github.tchx84.Flatseal

aur_helper: yay
