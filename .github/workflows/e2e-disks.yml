# Tier 2 integration: prove archwright's rendered archinstall JSON is accepted by
# a real archinstall against loopback block devices (CLAUDE.md gotcha #1).
#
# This validates the config against the *real* archinstall (catching schema drift
# after a version bump) via `archinstall --dry-run`: it parses the config and
# builds its device model against live loop devices, without partitioning,
# formatting or pacstrapping.
#
# A full install-to-completion is deliberately NOT run here: a bare container has
# no booted systemd, so archinstall's install phase fails on udev/D-Bus
# (timedatectl, systemctl) assumptions it makes about a live ISO. Real end-to-end
# installs run in the QEMU VM harness instead (test/vm.sh / `task vm`), which
# boots a real systemd. `test/e2e/disks.sh --mode full` still works for manual
# runs on a real host/VM (`task e2e-disks-full`); it's just not container CI.
name: e2e-disks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Validate the rendered JSON against a real archinstall (no install).
  light:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      # Loop devices + LVM need privileged access and the host's /dev.
      options: --privileged -v /dev:/dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - layout: single-disk-lvm
            fs: ext4
          - layout: multi-disk-lvm
            fs: xfs
          - layout: multi-disk-lvm
            fs: ext4
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          pacman -Sy --noconfirm --needed \
            go git util-linux lvm2 archinstall \
            dosfstools e2fsprogs xfsprogs python

      - name: Ensure loop module + control node
        run: |
          modprobe loop || true
          # In some runners /dev/loop-control is absent; create it so losetup -f works.
          test -e /dev/loop-control || mknod /dev/loop-control c 10 237 || true
          losetup -f

      - name: Start udevd
        # archinstall syncs with udev via `udevadm settle` after parted rewrites a
        # partition table. In a bare container nothing runs udevd, so settle is a
        # no-op and the new loopNpX partition nodes/attributes never materialize
        # -- archinstall then fails with "Unable to determine new partition
        # number". Running systemd-udevd makes settle real.
        run: |
          /usr/lib/systemd/systemd-udevd --daemon
          udevadm trigger --type=devices --action=add || true
          udevadm settle || true

      - name: Light validation (archinstall --dry-run)
        run: |
          bash test/e2e/disks.sh \
            --mode light \
            --layout "${{ matrix.layout }}" \
            --fs "${{ matrix.fs }}"
